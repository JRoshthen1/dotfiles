[main]
# Display and positioning
dpi-aware=auto
layer=top
anchor=top-right

font=BlexMono Nerd Font Propo:size=11:style=Bold
#font=Tabac Sans Black:size=14:style=Regular
#font=Tabac Sans:style=Regular:size=11
line-height=32
letter-spacing=0

# Prompt and behavior
icons-enabled=yes
show-actions=yes
fields=name,generic,comment,categories,filename,keywords
lines=12
width=40
x-margin=64
y-margin=4
horizontal-pad=10
vertical-pad=10
inner-pad=2
placeholder=" What?"
# Behavior
exit-on-keyboard-focus-loss=yes
terminal=foot -e

[colors]
# Gruvbox Dark Soft color scheme
background=1C1B19ee
text=d5c4a1ff
match=fb4934ff
selection=2a2a2a99
selection-match=fabd2fff
selection-text=fe8019ff
border=928374ff

[border]
width=0
radius=0
